name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: razer-mouse-battery

jobs:
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26-intel
            goos: darwin
            goarch: amd64
          - runner: macos-26
            goos: darwin
            goarch: arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          OUT: ${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}
        run: |
          mise run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.APP_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APP_NAME }}_darwin_amd64
            ${{ env.APP_NAME }}_darwin_arm64
          generate_release_notes: true
